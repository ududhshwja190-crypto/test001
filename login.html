<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Войти — Мессенджер</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Nunito',sans-serif}
body{
  min-height:100dvh;
  background:linear-gradient(145deg,#1a1a3e 0%,#2d2d6b 50%,#1a1a3e 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
}
.logo{font-size:52px;margin-bottom:10px}
.app-name{font-size:30px;font-weight:800;color:#fff;margin-bottom:4px}
.app-sub{color:rgba(255,255,255,0.45);font-size:14px;margin-bottom:36px}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:24px;padding:28px;width:100%;max-width:400px;
}

.tabs{display:flex;background:rgba(0,0,0,0.25);border-radius:13px;padding:4px;margin-bottom:22px}
.tab{flex:1;padding:9px;text-align:center;border-radius:10px;color:rgba(255,255,255,0.45);font-weight:700;font-size:14px;cursor:pointer;transition:.2s;font-family:inherit;border:none;background:none}
.tab.active{background:#5b7fff;color:#fff}

.inp{
  width:100%;background:rgba(255,255,255,0.08);
  border:1.5px solid rgba(255,255,255,0.12);color:#fff;
  padding:14px 16px;border-radius:14px;font-size:16px;
  font-family:inherit;outline:none;margin-bottom:12px;transition:.2s;
}
.inp:focus{border-color:#5b7fff;background:rgba(91,127,255,0.12)}
.inp::placeholder{color:rgba(255,255,255,0.3)}

.submit-btn{
  width:100%;padding:15px;
  background:linear-gradient(135deg,#5b7fff,#3a5ce0);
  color:#fff;border:none;border-radius:14px;
  font-size:16px;font-weight:800;font-family:inherit;
  cursor:pointer;transition:.2s;margin-top:4px;
}
.submit-btn:active{transform:scale(0.97);opacity:.9}

.err{color:#ff6b8a;font-size:13px;text-align:center;margin-top:10px;min-height:18px;font-weight:600}
</style>
</head>
<body>
<div class="logo">💬</div>
<div class="app-name">Мессенджер</div>
<div class="app-sub">Общайся, находи друзей</div>

<div class="card">
  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="setMode('login')">Вход</button>
    <button class="tab" id="tab-reg" onclick="setMode('reg')">Регистрация</button>
  </div>
  <input class="inp" id="inp-user" type="text" placeholder="Никнейм" autocomplete="username">
  <input class="inp" id="inp-pass" type="password" placeholder="Пароль" autocomplete="current-password">
  <button class="submit-btn" id="btn-submit" onclick="submit()">Войти</button>
  <div class="err" id="err"></div>
</div>

<script>
let mode = 'login';

function setMode(m) {
  mode = m;
  document.getElementById('tab-login').classList.toggle('active', m === 'login');
  document.getElementById('tab-reg').classList.toggle('active', m === 'reg');
  document.getElementById('btn-submit').textContent = m === 'login' ? 'Войти' : 'Зарегистрироваться';
  document.getElementById('err').textContent = '';
}

document.querySelectorAll('.inp').forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
});

async function submit() {
  const username = document.getElementById('inp-user').value.trim();
  const password = document.getElementById('inp-pass').value.trim();
  const errEl = document.getElementById('err');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = 'Заполните все поля'; return; }

  const url = mode === 'login' ? '/api/login' : '/api/register';
  try {
    const r = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await r.json();
    if (data.error) { errEl.textContent = data.error; return; }
    window.location.href = '/home';
  } catch(e) {
    errEl.textContent = 'Ошибка соединения';
  }
}

// Если уже залогинен — редирект
fetch('/api/me').then(r => r.json()).then(d => {
  if (d.logged) window.location.href = '/home';
});
</script>
</body>
</html>
