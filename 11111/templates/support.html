<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Поддержка</title>
<link rel="stylesheet" href="/static/style.css">
<style>
.new-ticket{background:#fff;margin:12px;border-radius:20px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.nt-title{font-size:16px;font-weight:800;margin-bottom:14px}
.inp{width:100%;padding:12px 16px;border-radius:14px;border:1.5px solid #dde1f0;background:#f6f7fc;font-size:15px;font-family:inherit;outline:none;margin-bottom:10px}
.inp:focus{border-color:var(--a)}
textarea.inp{height:90px;resize:none;line-height:1.5}
.send-btn{width:100%;padding:13px;border-radius:14px;border:none;background:var(--a);color:#fff;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer}
.send-btn:active{opacity:.85}
.ok-msg{color:#4cde90;font-size:13px;font-weight:700;text-align:center;margin-top:8px;min-height:18px}
.err-msg{color:#ff4d6d;font-size:13px;font-weight:700;text-align:center;margin-top:8px;min-height:18px}

.tickets-title{font-size:13px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:14px 16px 8px}
.ticket{background:#fff;margin:0 12px 10px;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.ticket-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ticket-subject{font-size:15px;font-weight:800;flex:1}
.status-badge{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
.status-open{background:#fff3e0;color:#ff9f5b}
.status-answered{background:#e8f5e9;color:#4cde90}
.status-closed{background:#f0f2f8;color:var(--muted)}
.ticket-msg{font-size:14px;color:var(--muted);margin-bottom:10px;line-height:1.4}
.ticket-date{font-size:11px;color:var(--muted)}

.replies{margin-top:10px;border-top:1px solid #f0f2f8;padding-top:10px;display:flex;flex-direction:column;gap:8px}
.reply{background:#f0f5ff;border-radius:12px;padding:10px 14px}
.reply-who{font-size:11px;font-weight:800;color:var(--a);margin-bottom:3px}
.reply-text{font-size:14px;line-height:1.4}
.reply-date{font-size:10px;color:var(--muted);margin-top:3px}

.info-box{background:linear-gradient(135deg,#5b7fff,#3a5ce0);margin:12px;border-radius:20px;padding:18px;color:#fff}
.info-box h3{font-size:16px;margin-bottom:6px}
.info-box p{font-size:13px;opacity:.85;line-height:1.5}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">←</button>
  <div class="topbar-title">Поддержка</div>
</div>

<div class="page">
  <div class="info-box">
    <h3>🎧 Служба поддержки</h3>
    <p>Забыли логин или пароль? Есть вопрос? Опишите проблему — мы ответим как можно скорее.</p>
  </div>

  <div class="new-ticket">
    <div class="nt-title">📩 Новое обращение</div>
    <input class="inp" id="inp-subject" placeholder="Тема (напр. Забыл пароль)">
    <textarea class="inp" id="inp-message" placeholder="Опишите вашу проблему подробнее..."></textarea>
    <button class="send-btn" onclick="sendTicket()">Отправить обращение</button>
    <div class="ok-msg" id="ok-msg"></div>
    <div class="err-msg" id="err-msg"></div>
  </div>

  <div class="tickets-title">Мои обращения</div>
  <div id="tickets-list"><div style="text-align:center;padding:20px;color:var(--muted);font-size:14px">Загрузка...</div></div>
</div>

<nav class="navbar">
  <a class="nav-item" href="/home"><div class="nav-icon">🏠</div><div class="nav-label">Главная</div></a>
  <a class="nav-item" href="/chats"><div class="nav-icon">💬</div><div class="nav-label">Чаты</div></a>
  <a class="nav-item" href="/people"><div class="nav-icon">👥</div><div class="nav-label">Люди</div></a>
  <a class="nav-item active" href="/profile"><div class="nav-icon">👤</div><div class="nav-label">Профиль</div></a>
</nav>

<script>
function esc(s){ return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''; }

async function init() {
  const me = await fetch('/api/me').then(r=>r.json());
  if (!me.logged) { window.location.href='/login'; return; }
  loadTickets();
}

async function sendTicket() {
  const subject = document.getElementById('inp-subject').value.trim();
  const message = document.getElementById('inp-message').value.trim();
  const okEl = document.getElementById('ok-msg');
  const errEl = document.getElementById('err-msg');
  okEl.textContent = ''; errEl.textContent = '';

  if (!subject || !message) { errEl.textContent = 'Заполните все поля'; return; }

  const r = await fetch('/api/support/ticket', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({subject, message})
  }).then(r=>r.json());

  if (r.error) { errEl.textContent = r.error; return; }
  okEl.textContent = '✅ Обращение отправлено! Ожидайте ответа.';
  document.getElementById('inp-subject').value = '';
  document.getElementById('inp-message').value = '';
  loadTickets();
}

async function loadTickets() {
  const tickets = await fetch('/api/support/my_tickets').then(r=>r.json());
  const el = document.getElementById('tickets-list');
  if (!tickets.length) {
    el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);font-size:14px">У вас ещё нет обращений</div>';
    return;
  }
  const statusNames = {open:'Открыто', answered:'Отвечено', closed:'Закрыто'};
  el.innerHTML = tickets.map(t => `
    <div class="ticket">
      <div class="ticket-head">
        <div class="ticket-subject">${esc(t.subject)}</div>
        <div class="status-badge status-${t.status}">${statusNames[t.status]||t.status}</div>
      </div>
      <div class="ticket-msg">${esc(t.message)}</div>
      <div class="ticket-date">📅 ${t.created_at}</div>
      ${t.replies.length ? `
        <div class="replies">
          ${t.replies.map(r => `
            <div class="reply">
              <div class="reply-who">🛡️ ${esc(r.admin_name)} (Поддержка)</div>
              <div class="reply-text">${esc(r.message)}</div>
              <div class="reply-date">${r.created_at}</div>
            </div>`).join('')}
        </div>` : ''}
    </div>`).join('');
}

init();
setInterval(loadTickets, 8000);
</script>
</body>
</html>
