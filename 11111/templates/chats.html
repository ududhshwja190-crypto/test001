<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Чаты</title>
<link rel="stylesheet" href="/static/style.css">
<style>
.unread-badge{background:#ff4d6d;color:#fff;font-size:11px;font-weight:800;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden;position:relative}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.online-dot{position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;background:#4cde90;border:2px solid #f0f2f8}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-title">Чаты</div></div>
<div class="page" id="chats-list"></div>

<nav class="navbar">
  <a class="nav-item" href="/home"><div class="nav-icon">🏠</div><div class="nav-label">Главная</div></a>
  <a class="nav-item active" href="/chats"><div class="nav-icon">💬</div><div class="nav-label">Чаты</div></a>
  <a class="nav-item" href="/people"><div class="nav-icon">👥</div><div class="nav-label">Люди</div><div class="nav-badge" id="nb">0</div></a>
  <a class="nav-item" href="/profile"><div class="nav-icon">👤</div><div class="nav-label">Профиль</div></a>
</nav>

<script>
function esc(s){ return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''; }
let lastJson = '';

// Event delegation
document.getElementById('chats-list').addEventListener('click', e => {
  const item = e.target.closest('.chat-item');
  if (item) window.location.href = '/chat/' + item.dataset.id;
});

async function init() {
  const me = await fetch('/api/me').then(r=>r.json());
  if (!me.logged) { window.location.href='/login'; return; }
  const friends = await fetch('/api/friends').then(r=>r.json());
  const nb = document.getElementById('nb');
  if (friends.pending.length) { nb.textContent = friends.pending.length; nb.style.display='flex'; }
  loadChats();
  setInterval(loadChats, 3000);
}

async function loadChats() {
  const [chats, online] = await Promise.all([
    fetch('/api/chats').then(r=>r.json()),
    fetch('/api/online').then(r=>r.json())
  ]);

  const json = JSON.stringify(chats) + JSON.stringify(online);
  if (json === lastJson) return;
  lastJson = json;

  const el = document.getElementById('chats-list');
  if (!chats.length) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">💬</div><p>У вас пока нет чатов.<br>Найдите друзей в разделе «Люди»!</p></div>';
    return;
  }

  el.innerHTML = chats.map(c => {
    const color = c.other_color || '#5b7fff';
    const initials = c.name ? c.name[0].toUpperCase() : '?';
    const lastMsg = c.last_msg ? `${c.last_user ? c.last_user+': ' : ''}${esc(c.last_msg)}` : 'Нет сообщений';
    const isOnline = c.other_id && online.includes(c.other_id);
    const avInner = c.other_img
      ? `<img src="${c.other_img}">`
      : initials;
    return `<div class="chat-item" data-id="${c.id}">
      <div class="av" style="background:${color};width:52px;height:52px;font-size:20px">
        ${avInner}
        ${isOnline ? '<div class="online-dot"></div>' : ''}
      </div>
      <div class="chat-info">
        <div class="chat-name">${esc(c.name)}</div>
        <div class="chat-last">${lastMsg}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">
        <div class="chat-time">${c.last_time||''}</div>
        ${c.unread > 0 ? `<div class="unread-badge">${c.unread > 99 ? '99+' : c.unread}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

init();
</script>
</body>
</html>
