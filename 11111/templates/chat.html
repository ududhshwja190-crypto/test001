<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Чат</title>
<link rel="stylesheet" href="/static/style.css">
<style>
body{overflow:hidden}
.page{padding-bottom:0;display:flex;flex-direction:column}

.online-dot{width:9px;height:9px;border-radius:50%;background:#4cde90;box-shadow:0 0 0 2px rgba(76,222,144,0.3);flex-shrink:0}
.offline-dot{width:9px;height:9px;border-radius:50%;background:#ccc;flex-shrink:0}
.online-label{font-size:11px;color:#4cde90;font-weight:700}
.offline-label{font-size:11px;color:var(--muted)}
.topbar-info{display:flex;flex-direction:column;flex:1;min-width:0}
.topbar-name{font-size:17px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.chat-box{
  flex:1;overflow-y:auto;padding:12px;
  display:flex;flex-direction:column;gap:8px;
  -webkit-overflow-scrolling:touch;
}

.bwrap{display:flex;flex-direction:column;position:relative}
.bwrap.me{align-items:flex-end}
.bwrap.other{align-items:flex-start}
.bwho{font-size:11px;font-weight:700;color:#5b7fff;margin-bottom:2px;padding:0 4px}

.bubble-row{display:flex;align-items:flex-end;gap:6px}
.bwrap.me .bubble-row{flex-direction:row-reverse}

.bubble{
  max-width:78%;padding:10px 14px;
  font-size:15px;line-height:1.45;word-break:break-word;
  box-shadow:0 1px 4px rgba(0,0,0,0.07);
}
.bubble.me{background:#5b7fff;color:#fff;border-radius:18px 18px 4px 18px}
.bubble.other{background:#fff;border-radius:18px 18px 18px 4px}
.bubble.deleted{opacity:.5;font-style:italic}

.del-btn{
  width:28px;height:28px;border-radius:50%;border:none;
  background:rgba(0,0,0,0.06);color:#999;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;opacity:0;transition:.15s;
}
.bwrap:hover .del-btn{opacity:1}
.bwrap.me .del-btn{background:rgba(91,127,255,0.15);color:#5b7fff}

.btime{font-size:10px;opacity:.55;margin-top:3px;padding:0 5px}

.input-area{
  background:#fff;border-top:1px solid #e8eaf0;
  padding:10px 12px;
  padding-bottom:max(12px,env(safe-area-inset-bottom));
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.msg-inp{
  flex:1;min-width:0;height:46px;padding:0 16px;
  border-radius:23px;border:1.5px solid #dde1f0;
  background:#f6f7fc;font-size:16px;font-family:inherit;outline:none;
}
.msg-inp:focus{border-color:#5b7fff}
.send-btn{
  flex-shrink:0;width:46px;height:46px;border-radius:50%;
  border:none;background:#5b7fff;color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:20px;transition:.15s;
}
.send-btn:active{background:#3a5ce0;transform:scale(0.92)}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">←</button>
  <div class="avatar" id="chat-av" style="width:38px;height:38px;font-size:15px;background:#5b7fff;flex-shrink:0">?</div>
  <div class="topbar-info">
    <div class="topbar-name" id="chat-title">Чат</div>
    <div style="display:flex;align-items:center;gap:5px">
      <div id="status-dot" class="offline-dot"></div>
      <div id="status-label" class="offline-label">офлайн</div>
    </div>
  </div>
</div>

<div class="page">
  <div class="chat-box" id="chat-box"></div>
  <div class="input-area">
    <input class="msg-inp" id="msg-inp" placeholder="Сообщение..." autocomplete="off">
    <button class="send-btn" id="send-btn">➤</button>
  </div>
</div>

<script>
const chatId = parseInt(window.location.pathname.split('/').pop());
let ME = null;
let otherUserId = null;
let lastMsgKey = '';

function esc(s){ return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''; }

async function init() {
  const me = await fetch('/api/me').then(r=>r.json());
  if (!me.logged) { window.location.href='/login'; return; }
  ME = me;

  // Загрузить инфо о чате
  const chats = await fetch('/api/chats').then(r=>r.json());
  const chat = chats.find(c => c.id === chatId);
  if (chat) {
    document.getElementById('chat-title').textContent = chat.name;
    const av = document.getElementById('chat-av');
    if (chat.other_img) {
      av.innerHTML = `<img src="${chat.other_img}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    } else {
      av.textContent = chat.name[0].toUpperCase();
    }
    av.style.background = chat.other_color || '#5b7fff';
    document.title = chat.name;
    // other_id может прийти строкой — приводим к числу
    if (chat.other_id) otherUserId = parseInt(chat.other_id);
  }

  await renderMessages();
  checkOnline();
  setInterval(tick, 2000);
}

async function tick() {
  renderMessages();
  checkOnline();
}

async function checkOnline() {
  if (!otherUserId) return;
  const online = await fetch('/api/online').then(r=>r.json());
  // online — массив чисел, otherUserId тоже число
  const isOnline = online.includes(otherUserId);
  document.getElementById('status-dot').className = isOnline ? 'online-dot' : 'offline-dot';
  document.getElementById('status-label').className = isOnline ? 'online-label' : 'offline-label';
  document.getElementById('status-label').textContent = isOnline ? 'онлайн' : 'офлайн';
}

async function renderMessages() {
  const resp = await fetch(`/api/chats/${chatId}/messages`);
  if (!resp.ok) return;
  const msgs = await resp.json();
  if (!Array.isArray(msgs)) return;

  // Запасной вариант: найти собеседника из сообщений
  if (!otherUserId) {
    const other = msgs.find(m => parseInt(m.user_id) !== ME.id);
    if (other) otherUserId = parseInt(other.user_id);
  }

  // Не перерисовывать если ничего не изменилось
  const lastId = msgs.length ? msgs[msgs.length-1].id : 0;
  const key = `${msgs.length}_${lastId}`;
  if (key === lastMsgKey) return;
  lastMsgKey = key;

  const box = document.getElementById('chat-box');
  const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 120;
  const isAdmin = ME.role === 'admin' || ME.role === 'support';

  if (msgs.length === 0) {
    box.innerHTML = '<div style="text-align:center;color:#aaa;margin-top:40px;font-size:15px">Напишите первое сообщение!</div>';
  } else {
    box.innerHTML = msgs.map(m => {
      const isMe = parseInt(m.user_id) === ME.id;
      const canDelete = (isMe || isAdmin) && !m.deleted;
      const delBtn = canDelete
        ? `<button class="del-btn" onclick="deleteMsg(${m.id})" title="Удалить">🗑</button>`
        : '';
      return `<div class="bwrap ${isMe?'me':'other'}">
        ${!isMe ? `<div class="bwho">${esc(m.username)}</div>` : ''}
        <div class="bubble-row">
          <div class="bubble ${isMe?'me':'other'}${m.deleted?' deleted':''}">${esc(m.text)}</div>
          ${delBtn}
        </div>
        <div class="btime">${m.time||''}</div>
      </div>`;
    }).join('');
  }

  if (atBottom || msgs.length <= 20) box.scrollTop = box.scrollHeight;
}

async function deleteMsg(msgId) {
  if (!confirm('Удалить сообщение?')) return;
  await fetch(`/api/chats/${chatId}/delete_message`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({message_id: msgId})
  });
  lastMsgKey = '';
  renderMessages();
}

async function sendMsg() {
  const inp = document.getElementById('msg-inp');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  inp.focus();
  const res = await fetch(`/api/chats/${chatId}/send`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({text})
  });
  if (res.ok) {
    lastMsgKey = '';
    renderMessages();
  }
}

document.getElementById('send-btn').addEventListener('click', sendMsg);
document.getElementById('msg-inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMsg();
});

init();
</script>
</body>
</html>
