<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Люди</title>
<link rel="stylesheet" href="/static/style.css">
<style>
.page{display:flex;flex-direction:column;padding-bottom:var(--nb)}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.btn-add{padding:7px 15px;border-radius:20px;border:2px solid var(--a);background:none;color:var(--a);font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;white-space:nowrap}
.btn-add.sent{border-color:var(--muted);color:var(--muted)}
.btn-add.friend{background:var(--a);color:#fff;border-color:var(--a)}
.btn-msg{padding:7px 13px;border-radius:20px;border:none;background:var(--a);color:#fff;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;white-space:nowrap}
.btn-remove{padding:7px 13px;border-radius:20px;border:none;background:#fff3f5;color:#ff4d6d;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer}
.btn-block{padding:7px 13px;border-radius:20px;border:none;background:#f0f2f8;color:var(--muted);font-weight:700;font-size:13px;font-family:inherit;cursor:pointer}
.btn-accept{padding:7px 14px;border-radius:20px;border:none;background:#4cde90;color:#fff;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer}
.pending-card{margin:8px 14px;background:#fff5f7;border:1.5px solid #ffd0da;border-radius:16px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-title">Люди</div></div>

<div class="page">
  <div style="flex-shrink:0">
    <div class="search-wrap">
      <input class="search-inp" id="search-inp" type="text" placeholder="🔍  Найти пользователя...">
    </div>
  </div>
  <div class="scroll-area">
    <div id="pending-block"></div>
    <div id="search-results"></div>
    <div id="friends-block"></div>
  </div>
</div>

<nav class="navbar">
  <a class="nav-item" href="/home"><div class="nav-icon">🏠</div><div class="nav-label">Главная</div></a>
  <a class="nav-item" href="/chats"><div class="nav-icon">💬</div><div class="nav-label">Чаты</div></a>
  <a class="nav-item active" href="/people"><div class="nav-icon">👥</div><div class="nav-label">Люди</div><div class="nav-badge" id="nb">0</div></a>
  <a class="nav-item" href="/profile"><div class="nav-icon">👤</div><div class="nav-label">Профиль</div></a>
</nav>

<script>
function esc(s){ return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''; }
let searchTimer = null;

function avatarHtml(u, size=44) {
  if (u.avatar_img) return `<div class="av" style="width:${size}px;height:${size}px;font-size:${Math.floor(size*0.38)}px;background:${u.avatar_color}"><img src="${u.avatar_img}"></div>`;
  return `<div class="av" style="width:${size}px;height:${size}px;font-size:${Math.floor(size*0.38)}px;background:${u.avatar_color}">${u.username[0].toUpperCase()}</div>`;
}

async function init() {
  const me = await fetch('/api/me').then(r=>r.json());
  if (!me.logged) { window.location.href='/login'; return; }
  loadFriends();
}

async function loadFriends() {
  const data = await fetch('/api/friends').then(r=>r.json());
  const nb = document.getElementById('nb');
  if (data.pending.length) { nb.textContent = data.pending.length; nb.style.display='flex'; }
  else nb.style.display='none';

  // Pending
  const pendingEl = document.getElementById('pending-block');
  if (data.pending.length) {
    pendingEl.innerHTML = `<div class="section-title" style="color:#ff4d6d">📬 Запросы в друзья</div>` +
      data.pending.map(u => `
        <div class="pending-card">
          ${avatarHtml(u, 42)}
          <div style="flex:1"><div style="font-weight:700;font-size:15px">${esc(u.username)}</div><div style="font-size:12px;color:var(--muted)">хочет дружить</div></div>
          <button class="btn-accept" data-uid="${u.id}">Принять</button>
        </div>`).join('');
    pendingEl.querySelectorAll('.btn-accept').forEach(btn => {
      btn.addEventListener('click', async () => {
        await api('/api/friends/add', {friend_id: parseInt(btn.dataset.uid)});
        loadFriends();
      });
    });
  } else pendingEl.innerHTML = '';

  // Friends list
  const friendsEl = document.getElementById('friends-block');
  if (data.friends.length) {
    friendsEl.innerHTML = `<div class="section-title">✅ Мои друзья (${data.friends.length})</div>` +
      data.friends.map(u => `
        <div class="user-item">
          ${avatarHtml(u, 44)}
          <div class="user-info"><div class="user-name">${esc(u.username)}</div><div class="user-sub">Друг ✓</div></div>
          <div style="display:flex;gap:6px">
            <button class="btn-msg" data-uid="${u.id}">💬</button>
            <button class="btn-remove" data-uid="${u.id}">✕</button>
          </div>
        </div>`).join('');
    friendsEl.querySelectorAll('.btn-msg').forEach(btn => btn.addEventListener('click', () => startChat(parseInt(btn.dataset.uid))));
    friendsEl.querySelectorAll('.btn-remove').forEach(btn => btn.addEventListener('click', async () => {
      if (!confirm('Удалить из друзей?')) return;
      await api('/api/friends/remove', {friend_id: parseInt(btn.dataset.uid)});
      loadFriends();
    }));
  } else {
    friendsEl.innerHTML = `<div class="empty"><div class="empty-ico">👥</div><p>Пока нет друзей.<br>Найди их через поиск!</p></div>`;
  }
}

document.getElementById('search-inp').addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(this.value.trim()), 300);
});

async function doSearch(q) {
  const el = document.getElementById('search-results');
  const show = q.length > 0;
  document.getElementById('friends-block').style.display = show ? 'none' : '';
  document.getElementById('pending-block').style.display = show ? 'none' : '';
  if (!q) { el.innerHTML = ''; return; }

  const users = await fetch(`/api/users/search?q=${encodeURIComponent(q)}`).then(r=>r.json());
  if (!users.length) { el.innerHTML = `<div class="empty" style="padding:30px"><div class="empty-ico">🔍</div><p>Никого не найдено</p></div>`; return; }

  el.innerHTML = users.map(u => {
    const isFriend = u.my_status === 'accepted';
    const isPending = u.my_status === 'pending';
    const isBlocked = u.is_blocked;
    let btns = '';
    if (isBlocked) {
      btns = `<button class="btn-block" data-uid="${u.id}" data-action="unblock">Разблок.</button>`;
    } else if (isFriend) {
      btns = `<button class="btn-msg" data-uid="${u.id}" data-action="msg">💬</button>
              <button class="btn-block" data-uid="${u.id}" data-action="block">🚫</button>`;
    } else if (isPending) {
      btns = `<button class="btn-add sent" disabled>Отправлено</button>`;
    } else {
      btns = `<button class="btn-add" data-uid="${u.id}" data-action="add">+ Добавить</button>
              <button class="btn-block" data-uid="${u.id}" data-action="block">🚫</button>`;
    }
    return `<div class="user-item">
      ${avatarHtml(u, 44)}
      <div class="user-info"><div class="user-name">${esc(u.username)}</div></div>
      <div style="display:flex;gap:6px;align-items:center">${btns}</div>
    </div>`;
  }).join('');

  el.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const uid = parseInt(btn.dataset.uid);
      const action = btn.dataset.action;
      if (action === 'add') {
        await api('/api/friends/add', {friend_id: uid});
        btn.textContent = 'Отправлено'; btn.classList.add('sent'); btn.disabled = true;
      } else if (action === 'msg') {
        startChat(uid);
      } else if (action === 'block') {
        if (!confirm('Заблокировать пользователя?')) return;
        await api('/api/block', {user_id: uid});
        doSearch(document.getElementById('search-inp').value.trim());
      } else if (action === 'unblock') {
        await api('/api/unblock', {user_id: uid});
        doSearch(document.getElementById('search-inp').value.trim());
      }
    });
  });
}

async function startChat(userId) {
  const r = await api('/api/chats/open', {user_id: userId});
  if (r.chat_id) window.location.href = '/chat/' + r.chat_id;
}

async function api(url, data) {
  return fetch(url, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).then(r=>r.json());
}

init();
</script>
</body>
</html>
